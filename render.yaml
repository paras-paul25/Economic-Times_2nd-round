services:
  - type: web
    name: et-ai-concierge
    runtime: python
    repo: https://github.com/paras-paul25/Economic-Times_2nd-round
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
